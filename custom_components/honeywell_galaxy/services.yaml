# Services for Honeywell Galaxy integration

print_text:
  name: Print Text
  description: Print text to the virtual printer.
  fields:
    text:
      name: Text
      description: The text to print
      required: true
      selector:
        text:

test_mqtt:
  name: Test MQTT
  description: Test MQTT publishing (for debugging).
  fields:
    topic:
      name: Topic
      description: MQTT topic to publish to
      required: true
      selector:
        text:
    payload:
      name: Payload
      description: Message payload
      required: true
      selector:
        text:
